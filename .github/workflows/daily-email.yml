name: Daily Motivation Email

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "50 11 * * *"

permissions:
  contents: write

concurrency:
  group: daily-motivation-email
  cancel-in-progress: false

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Wait for 9:00 AM Sao Paulo time
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          target_epoch=$(TZ=America/Sao_Paulo date -d '09:00 today' +%s)
          current_epoch=$(TZ=America/Sao_Paulo date +%s)

          if [ "$current_epoch" -lt "$target_epoch" ]; then
            sleep_seconds=$((target_epoch - current_epoch))
            echo "Waiting ${sleep_seconds}s for 9:00 AM in Sao Paulo."
            sleep "$sleep_seconds"
          else
            echo "Sao Paulo is already past 9:00 AM. Continuing immediately."
          fi

      - name: Send daily email
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: node src/index.js

      - name: Commit updated history
        run: |
          if git diff --quiet -- data/history.json; then
            echo "No history changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git commit -m "Update daily motivation history"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
